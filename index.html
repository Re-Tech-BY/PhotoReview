<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReTech Отчеты</title>

<style>
body {
  margin: 0;
  background: #0f0f0f;
  color: white;
  font-family: Arial;
}

header {
  text-align: center;
  padding: 16px;
  font-size: 22px;
  background: black;
}

.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 12px;
  padding: 12px;
}

@media (min-width: 600px) {
  .grid {
    grid-template-columns: 1fr 1fr;
  }
}

.card {
  background: #1a1a1a;
  border-radius: 12px;
  overflow: hidden;
}

.card img {
  width: 100%;
  display: block;
}

.info {
  padding: 10px;
}

.name {
  font-weight: bold;
  font-size: 14px;
}

.city {
  color: #aaa;
  font-size: 12px;
}
</style>
</head>

<body>

<header>ReTech • ФОТО ОТЧЁТЫ 💎</header>

<div class="grid" id="gallery"></div>

<script>
const data = [
  { img: "16.JPG", name: "Александр", city: "Жодино" },
  { img: "15.JPG", name: "Сергей", city: "Минск" },
  { img: "14.JPG", name: "Илья", city: "Витебск" },
  { img: "13.JPG", name: "Дарья", city: "Могилёв" },
  { img: "12.JPG", name: "Алексей", city: "Москва" },
  { img: "11.JPG", name: "Захар", city: "Брест" },
  { img: "10.JPG", name: "Наталья", city: "Вроцлав" },
  { img: "9.JPG", name: "Матвей", city: "Жлобин" },
  { img: "8.JPG", name: "Юлия", city: "Гомель" },
  { img: "7.JPG", name: "Елена", city: "Минск" },
  { img: "6.JPG", name: "Эдуард", city: "Лида" },
  { img: "5.JPG", name: "Ульяна", city: "Солигорск" },
  { img: "4.JPG", name: "Михаил", city: "Варшава" },
  { img: "3.JPG", name: "Жанна", city: "Минск" },
  { img: "2.JPG", name: "Артур", city: "Орша" },
  { img: "1.JPG", name: "Вадим", city: "Слуцк" }
];

const container = document.getElementById('gallery');

data.forEach(item => {
  const div = document.createElement('div');
  div.className = 'card';

  div.innerHTML = `
    <img src="${item.img}">
    <div class="info">
      <div class="name">${item.name}</div>
      <div class="city">${item.city}</div>
    </div>
  `;

  container.appendChild(div);
});
</script>

</body>
</html>
